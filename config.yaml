model_list:

  # ── Qwen3.6-35B-A3B NVFP4 (multimodal, coding, OCR) ─────────────────────
  # Routes through model_manager :8002, which handles sticky routing by
  # previous_response_id (vLLM prefix cache reuse), trim, scale-out across
  # slots, and idle unload.  Single entry — model_manager does internal
  # load balancing across however many slots are running this model.
  - model_name: qwen3.6-35b-a3b
    litellm_params:
      model: openai/qwen3.6-35b-a3b
      api_base: http://127.0.0.1:8002/v1
      api_key: local-qwen36
      max_tokens: 32768
      timeout: 600
      stream_timeout: 600
    model_info:
      max_context_window_tokens: 122880
      supports_vision: true

  # ── Qwen3.6-27B Text NVFP4+MTP ──────────────────────────────────────────
  # Also routes through model_manager.  27b shares the GPU pool with 35b
  # — only spawns when requested and another slot is free or idle-unloads.
  - model_name: qwen3.6-27b
    litellm_params:
      model: openai/qwen3.6-27b
      api_base: http://127.0.0.1:8002/v1
      api_key: local-qwen36
      max_tokens: 16384
      timeout: 600
      stream_timeout: 600
    model_info:
      max_context_window_tokens: 65536

  # ── External fallback (disabled — API key invalid) ───────────────────────
  # - model_name: gpt-5.4-mini
  #   litellm_params:
  #     model: openai/gpt-5.4-mini
  #     api_base: https://api.kksj.org/v1
  #     api_key: os.environ/OPENAI_API_KEY


router_settings:
  routing_strategy: latency-based-routing
  num_retries: 0          # cold-starts block in model_manager — retries don't help
  retry_after: 0

  # fallbacks disabled — re-enable when a valid external API key is available
  # fallbacks:
  #   - qwen3.6-35b-a3b: ["gpt-5.4-mini"]
  #   - qwen3.6-27b: ["gpt-5.4-mini"]

  # context_window_fallbacks:
  #   - qwen3.6-35b-a3b: ["gpt-5.4-mini"]
  #   - qwen3.6-27b: ["gpt-5.4-mini"]

litellm_settings:
  context_management:
    enabled: true
    compact_threshold: 92160  # 75% of 122880

  drop_params: true
  set_verbose: false

  store_responses: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  port: 8901
  proxy_base_url: "http://stardust-gpu4:8900"
  health_check_interval: 0   # disable background probes — they hit vLLM and reset idle timer
